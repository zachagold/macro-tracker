<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Macro Tracker</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0f0f0f; color: #f0f0f0; font-family: system-ui, -apple-system, sans-serif; }
input[type=number]::-webkit-outer-spin-button,
input[type=number]::-webkit-inner-spin-button { -webkit-appearance: none; }
input[type=number] { -moz-appearance: textfield; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useEffect } = React;
const CAL_PER_G = { carb: 4, fat: 9, pro: 4 };
const DEFAULT_GOALS = { cal: 1710, carb: 144, fat: 62, pro: 149 };
const COLORS = { cal: "#f97316", carb: "#3b82f6", fat: "#a855f7", pro: "#22c55e" };

function todayKey() { return new Date().toISOString().slice(0, 10); }
function fmtDate(key) {
  return new Date(key + "T12:00:00").toLocaleDateString("en-US", { weekday: "short", month: "short", day: "numeric" });
}
function offsetDate(key, days) {
  const d = new Date(key + "T12:00:00");
  d.setDate(d.getDate() + days);
  return d.toISOString().slice(0, 10);
}

function Ring({ color, used, goal, label, unit }) {
  const circ = 169.6;
  const pct = goal > 0 ? Math.min(used / goal, 1) : 0;
  const offset = circ - pct * circ;
  const over = goal > 0 && used > goal;
  return (
    <div style={s.ringCard}>
      <svg viewBox="0 0 64 64" width={64} height={64}>
        <circle cx={32} cy={32} r={27} fill="none" stroke="#2e2e2e" strokeWidth={6} />
        <circle cx={32} cy={32} r={27} fill="none" stroke={over ? "#ef4444" : color}
          strokeWidth={6} strokeLinecap="round" strokeDasharray={circ} strokeDashoffset={offset}
          transform="rotate(-90 32 32)" style={{ transition: "stroke-dashoffset 0.5s ease" }} />
      </svg>
      <div style={s.ringLabel}>{label}</div>
      <div style={{ ...s.ringRemain, color: over ? "#ef4444" : color }}>
        {goal ? (over ? "-" : "") + Math.abs(Math.round(goal - used)) + unit : "---"}
      </div>
    </div>
  );
}

function ProgressBar({ color, used, goal, label, unit }) {
  const pct = goal > 0 ? Math.min(used / goal, 1) : 0;
  const over = goal > 0 && used > goal;
  return (
    <div style={s.pbRow}>
      <div style={s.pbLabel}>{label}</div>
      <div style={s.pbTrack}>
        <div style={{ ...s.pbFill, width: (pct*100) + "%", background: over ? "#ef4444" : color, transition: "width 0.4s ease" }} />
      </div>
      <div style={{ ...s.pbValue, color: over ? "#ef4444" : color }}>
        {Math.round(used)}{unit} / {goal}{unit}
      </div>
    </div>
  );
}

function App() {
  const [goals, setGoals] = useState(() => {
    try {
      const g = JSON.parse(localStorage.getItem("mg_goals") || "{}");
      return { cal: Number(g.cal)||DEFAULT_GOALS.cal, carb: Number(g.carb)||DEFAULT_GOALS.carb, fat: Number(g.fat)||DEFAULT_GOALS.fat, pro: Number(g.pro)||DEFAULT_GOALS.pro };
    } catch(e) { return { ...DEFAULT_GOALS }; }
  });
  const [modes, setModes] = useState(() => {
    try {
      const m = JSON.parse(localStorage.getItem("mg_modes") || "{}");
      return { carb: m.carb==="%"?"%":"g", fat: m.fat==="%"?"%":"g", pro: m.pro==="%"?"%":"g" };
    } catch(e) { return { carb:"g", fat:"g", pro:"g" }; }
  });
  const [allData, setAllData] = useState(() => {
    try { return JSON.parse(localStorage.getItem("mg_data") || "{}"); } catch(e) { return {}; }
  });
  const [savedFoods, setSavedFoods] = useState(() => {
    try { return JSON.parse(localStorage.getItem("mg_saved") || "[]"); } catch(e) { return []; }
  });
  const [currentDate, setCurrentDate] = useState(todayKey());
  const [entryName, setEntryName] = useState("");
  const [inCal, setInCal] = useState("");
  const [inCarb, setInCarb] = useState("");
  const [inFat, setInFat] = useState("");
  const [inPro, setInPro] = useState("");
  const [showSavedList, setShowSavedList] = useState(false);
  const [showModal, setShowModal] = useState(false);
  const [showWeekly, setShowWeekly] = useState(false);
  const [editIdx, setEditIdx] = useState(null);
  const [gCal, setGCal] = useState(String(DEFAULT_GOALS.cal));
  const [gCarb, setGCarb] = useState(String(DEFAULT_GOALS.carb));
  const [gFat, setGFat] = useState(String(DEFAULT_GOALS.fat));
  const [gPro, setGPro] = useState(String(DEFAULT_GOALS.pro));
  const [tempModes, setTempModes] = useState({ carb:"g", fat:"g", pro:"g" });

  useEffect(() => { localStorage.setItem("mg_goals", JSON.stringify(goals)); }, [goals]);
  useEffect(() => { localStorage.setItem("mg_modes", JSON.stringify(modes)); }, [modes]);
  useEffect(() => { localStorage.setItem("mg_data", JSON.stringify(allData)); }, [allData]);
  useEffect(() => { localStorage.setItem("mg_saved", JSON.stringify(savedFoods)); }, [savedFoods]);

  const entries = allData[currentDate] || [];
  const totals = entries.reduce(
    (acc, e) => ({ cal: acc.cal+(Number(e.cal)||0), carb: acc.carb+(Number(e.carb)||0), fat: acc.fat+(Number(e.fat)||0), pro: acc.pro+(Number(e.pro)||0) }),
    { cal: 0, carb: 0, fat: 0, pro: 0 }
  );

  function gramsGoal(macro) {
    const val = goals[macro];
    if (!val) return 0;
    if (modes[macro] === "%") return goals.cal ? Math.round((goals.cal * val / 100) / CAL_PER_G[macro]) : 0;
    return val;
  }

  const gCarbs = gramsGoal("carb");
  const gFats = gramsGoal("fat");
  const gPros = gramsGoal("pro");

  function changeDay(dir) {
    const d = new Date(currentDate + "T12:00:00");
    d.setDate(d.getDate() + dir);
    setCurrentDate(d.toISOString().slice(0, 10));
  }

  function addEntry() {
    const cal = Number(inCal)||0, carb = Number(inCarb)||0, fat = Number(inFat)||0, pro = Number(inPro)||0;
    if (!cal && !carb && !fat && !pro) return;
    const name = entryName.trim() || "Entry";
    if (editIdx !== null) {
      setAllData(prev => {
        const updated = [...(prev[currentDate]||[])];
        updated[editIdx] = { name, cal, carb, fat, pro };
        return { ...prev, [currentDate]: updated };
      });
      setEditIdx(null);
    } else {
      setAllData(prev => ({ ...prev, [currentDate]: [...(prev[currentDate]||[]), { name, cal, carb, fat, pro }] }));
    }
    setEntryName(""); setInCal(""); setInCarb(""); setInFat(""); setInPro("");
  }

  function startEdit(i) {
    const e = entries[i];
    setEntryName(e.name); setInCal(String(e.cal));
    setInCarb(String(e.carb)); setInFat(String(e.fat)); setInPro(String(e.pro));
    setEditIdx(i);
    window.scrollTo({ top: 0, behavior: "smooth" });
  }

  function cancelEdit() {
    setEditIdx(null);
    setEntryName(""); setInCal(""); setInCarb(""); setInFat(""); setInPro("");
  }

  function copyYesterday() {
    const yesterday = offsetDate(currentDate, -1);
    const yEntries = allData[yesterday] || [];
    if (yEntries.length === 0) { alert("No entries found for yesterday."); return; }
    if ((allData[currentDate]||[]).length > 0) {
      if (!window.confirm("This will add yesterday's entries to today. Continue?")) return;
    }
    setAllData(prev => ({ ...prev, [currentDate]: [...(prev[currentDate]||[]), ...yEntries] }));
  }

  function saveCurrentAsFood() {
    const cal = Number(inCal)||0, carb = Number(inCarb)||0, fat = Number(inFat)||0, pro = Number(inPro)||0;
    const name = entryName.trim();
    if (!name) { alert("Add a label before saving"); return; }
    if (!cal && !carb && !fat && !pro) { alert("Enter at least one macro before saving"); return; }
    if (savedFoods.find(f => f.name.toLowerCase() === name.toLowerCase())) { alert("A saved entry with that name already exists"); return; }
    setSavedFoods(prev => [...prev, { name, cal, carb, fat, pro }]);
    alert(name + " saved!");
  }

  function loadSavedFood(food) {
    setEntryName(food.name); setInCal(String(food.cal));
    setInCarb(String(food.carb)); setInFat(String(food.fat)); setInPro(String(food.pro));
    setShowSavedList(false);
  }

  function deleteSavedFood(i) { setSavedFoods(prev => prev.filter((_, idx) => idx !== i)); }

  function deleteEntry(i) {
    if (editIdx === i) cancelEdit();
    setAllData(prev => ({ ...prev, [currentDate]: prev[currentDate].filter((_, idx) => idx !== i) }));
  }

  // Weekly summary
  function getWeeklySummary() {
    const days = [];
    for (let i = 6; i >= 0; i--) {
      const key = offsetDate(todayKey(), -i);
      const dayEntries = allData[key] || [];
      const t = dayEntries.reduce(
        (acc, e) => ({ cal: acc.cal+(Number(e.cal)||0), carb: acc.carb+(Number(e.carb)||0), fat: acc.fat+(Number(e.fat)||0), pro: acc.pro+(Number(e.pro)||0) }),
        { cal: 0, carb: 0, fat: 0, pro: 0 }
      );
      days.push({ key, label: i === 0 ? "Today" : fmtDate(key).split(",")[0], ...t, hasData: dayEntries.length > 0 });
    }
    const logged = days.filter(d => d.hasData);
    const avg = logged.length > 0 ? {
      cal: Math.round(logged.reduce((a,d) => a+d.cal, 0) / logged.length),
      carb: Math.round(logged.reduce((a,d) => a+d.carb, 0) / logged.length),
      fat: Math.round(logged.reduce((a,d) => a+d.fat, 0) / logged.length),
      pro: Math.round(logged.reduce((a,d) => a+d.pro, 0) / logged.length),
    } : null;
    return { days, avg, loggedCount: logged.length };
  }

  function openModal() {
    setGCal(String(goals.cal)); setGCarb(String(goals.carb));
    setGFat(String(goals.fat)); setGPro(String(goals.pro));
    setTempModes({ ...modes }); setShowModal(true);
  }

  function saveGoals() {
    setGoals({ cal: Number(gCal)||0, carb: Number(gCarb)||0, fat: Number(gFat)||0, pro: Number(gPro)||0 });
    setModes({ ...tempModes }); setShowModal(false);
  }

  function resetAll() {
    if (!window.confirm("Clear all data and goals? This cannot be undone.")) return;
    localStorage.clear();
    setGoals({ ...DEFAULT_GOALS }); setModes({ carb:"g", fat:"g", pro:"g" });
    setAllData({}); setSavedFoods([]); setShowModal(false);
  }

  function hint(macro, val, cal) {
    const v = Number(val); if (!v) return "";
    if (tempModes[macro] === "%") return Number(cal)>0 ? "= " + Math.round((Number(cal)*v/100)/CAL_PER_G[macro]) + "g" : "Enter calories first";
    return Number(cal)>0 ? "= " + Math.round((v*CAL_PER_G[macro]/Number(cal))*100) + "% of cals" : "Enter calories first";
  }

  const dateLabel = currentDate === todayKey() ? "Today -- " + fmtDate(currentDate) : fmtDate(currentDate);
  const weekly = showWeekly ? getWeeklySummary() : null;

  return (
    <div style={s.root}>
      {/* Header */}
      <div style={s.header}>
        <div style={s.headerTitle}>MACRO TRACKER</div>
        <div style={s.headerSub}>Tap gear to edit goals</div>
      </div>

      {/* Date bar */}
      <div style={s.dateBar}>
        <button style={s.dateBtn} onClick={() => changeDay(-1)}>{"<"}</button>
        <span style={s.dateLabel}>{dateLabel}</span>
        <button style={s.dateBtn} onClick={() => changeDay(1)}>{">"}</button>
      </div>

      {/* Rings */}
      <div style={s.rings}>
        <Ring color={COLORS.cal}  used={totals.cal}  goal={goals.cal}  label="CALS"    unit="" />
        <Ring color={COLORS.carb} used={totals.carb} goal={gCarbs}     label="CARBS"   unit="g" />
        <Ring color={COLORS.fat}  used={totals.fat}  goal={gFats}      label="FAT"     unit="g" />
        <Ring color={COLORS.pro}  used={totals.pro}  goal={gPros}      label="PROTEIN" unit="g" />
      </div>

      {/* Progress bars */}
      <div style={s.pbSection}>
        <ProgressBar color={COLORS.cal}  used={totals.cal}  goal={goals.cal} label="Cal"  unit="" />
        <ProgressBar color={COLORS.carb} used={totals.carb} goal={gCarbs}    label="Carb" unit="g" />
        <ProgressBar color={COLORS.fat}  used={totals.fat}  goal={gFats}     label="Fat"  unit="g" />
        <ProgressBar color={COLORS.pro}  used={totals.pro}  goal={gPros}     label="Pro"  unit="g" />
      </div>

      {/* Weekly summary toggle */}
      <div style={s.section}>
        <button style={s.weeklyToggle} onClick={() => setShowWeekly(v => !v)}>
          {showWeekly ? "Hide Weekly Summary" : "Show Weekly Summary"}
        </button>
        {showWeekly && weekly && (
          <div style={s.weeklyCard}>
            <div style={s.weeklyHeader}>
              Last 7 Days — {weekly.loggedCount} day{weekly.loggedCount !== 1 ? "s" : ""} logged
            </div>
            {weekly.days.map(d => (
              <div key={d.key} style={{ ...s.weeklyRow, opacity: d.hasData ? 1 : 0.35 }}>
                <div style={s.weeklyDay}>{d.label}</div>
                <div style={s.weeklyMacros}>
                  {d.hasData ? (
                    <>
                      <span style={{ color: COLORS.cal }}>{d.cal}</span>
                      <span style={{ color: COLORS.carb }}>{d.carb}g</span>
                      <span style={{ color: COLORS.fat }}>{d.fat}g</span>
                      <span style={{ color: COLORS.pro }}>{d.pro}g</span>
                    </>
                  ) : <span style={{ color: "#444" }}>no data</span>}
                </div>
              </div>
            ))}
            {weekly.avg && (
              <div style={s.weeklyAvg}>
                <div style={s.weeklyDay}>Avg</div>
                <div style={s.weeklyMacros}>
                  <span style={{ color: COLORS.cal }}>{weekly.avg.cal}</span>
                  <span style={{ color: COLORS.carb }}>{weekly.avg.carb}g</span>
                  <span style={{ color: COLORS.fat }}>{weekly.avg.fat}g</span>
                  <span style={{ color: COLORS.pro }}>{weekly.avg.pro}g</span>
                </div>
              </div>
            )}
          </div>
        )}
      </div>

      {/* Add Entry */}
      <div style={s.section}>
        <div style={s.sectionTitleRow}>
          <div style={s.sectionTitle}>{editIdx !== null ? "EDIT ENTRY" : "ADD ENTRY"}</div>
          {currentDate === todayKey() && editIdx === null && (
            <button style={s.copyBtn} onClick={copyYesterday}>Copy Yesterday</button>
          )}
        </div>
        <div style={{ ...s.addCard, borderColor: editIdx !== null ? "#f97316" : "#2e2e2e" }}>
          <div style={s.savedRow}>
            <button style={s.savedBtn} onClick={() => setShowSavedList(v => !v)}>
              {"★ Saved Foods " + (savedFoods.length > 0 ? "(" + savedFoods.length + ")" : "")}
            </button>
            <button style={s.saveAsBtn} onClick={saveCurrentAsFood}>+ Save</button>
          </div>
          {showSavedList && (
            <div style={s.savedList}>
              {savedFoods.length === 0 ? (
                <div style={s.savedEmpty}>No saved foods yet. Fill in an entry and tap + Save.</div>
              ) : savedFoods.map((f, i) => (
                <div key={i} style={s.savedItem}>
                  <div style={s.savedItemInfo} onClick={() => loadSavedFood(f)}>
                    <div style={s.savedItemName}>{f.name}</div>
                    <div style={s.savedItemMacros}>
                      <span style={{ color: COLORS.cal }}>{f.cal} cal</span>
                      <span style={{ color: COLORS.carb }}>{f.carb}g C</span>
                      <span style={{ color: COLORS.fat }}>{f.fat}g F</span>
                      <span style={{ color: COLORS.pro }}>{f.pro}g P</span>
                    </div>
                  </div>
                  <button style={s.delBtn} onClick={() => deleteSavedFood(i)}>x</button>
                </div>
              ))}
            </div>
          )}
          <input style={s.nameInput} placeholder="Label (e.g. Chicken and Rice)"
            value={entryName} onChange={e => setEntryName(e.target.value)} />
          <div style={s.macroInputs}>
            {[
              { id:"cal",  label:"CAL",       val:inCal,  set:setInCal,  color:COLORS.cal },
              { id:"carb", label:"CARBS g",   val:inCarb, set:setInCarb, color:COLORS.carb },
              { id:"fat",  label:"FAT g",     val:inFat,  set:setInFat,  color:COLORS.fat },
              { id:"pro",  label:"PROTEIN g", val:inPro,  set:setInPro,  color:COLORS.pro },
            ].map(f => (
              <div key={f.id} style={s.macroField}>
                <div style={{ ...s.macroLabel, color: f.color }}>{f.label}</div>
                <input style={s.macroInput} type="number" inputMode="decimal"
                  placeholder="0" value={f.val} onChange={e => f.set(e.target.value)} />
              </div>
            ))}
          </div>
          <div style={{ display:"flex", gap:8 }}>
            <button style={s.addBtn} onClick={addEntry}>
              {editIdx !== null ? "SAVE EDIT" : "+ ADD"}
            </button>
            {editIdx !== null && (
              <button style={s.cancelBtn} onClick={cancelEdit}>CANCEL</button>
            )}
          </div>
        </div>
      </div>

      {/* Log */}
      <div style={s.section}>
        <div style={s.sectionTitle}>TODAY'S LOG</div>
        {entries.length === 0 ? <div style={s.empty}>No entries yet</div> : entries.map((e, i) => (
          <div key={i} style={{ ...s.entry, borderColor: editIdx===i ? "#f97316" : "#2e2e2e" }}>
            <div style={s.entryInfo}>
              <div style={s.entryName}>{e.name}</div>
              <div style={s.entryMacros}>
                <span style={{ color: COLORS.cal }}>{e.cal} cal</span>
                <span style={{ color: COLORS.carb }}>{e.carb}g carbs</span>
                <span style={{ color: COLORS.fat }}>{e.fat}g fat</span>
                <span style={{ color: COLORS.pro }}>{e.pro}g protein</span>
              </div>
            </div>
            <button style={s.editBtn} onClick={() => startEdit(i)}>edit</button>
            <button style={s.delBtn} onClick={() => deleteEntry(i)}>x</button>
          </div>
        ))}
      </div>

      {/* FAB */}
      <button style={s.fab} onClick={openModal}>gear</button>

      {/* Goals Modal */}
      {showModal && (
        <div style={s.overlay} onClick={e => e.target === e.currentTarget && setShowModal(false)}>
          <div style={s.modal}>
            <button style={s.closeBtn} onClick={() => setShowModal(false)}>x</button>
            <div style={s.modalTitle}>DAILY GOALS</div>
            <div style={s.calGoal}>
              <div style={{ ...s.goalLabel, color: COLORS.cal }}>CALORIES</div>
              <input style={s.goalInput} type="number" inputMode="decimal"
                placeholder="1710" value={gCal} onChange={e => setGCal(e.target.value)} />
            </div>
            {[
              { macro:"carb", label:"CARBS",   color:COLORS.carb, val:gCarb, set:setGCarb, ph:{g:"144", p:"34"} },
              { macro:"fat",  label:"FAT",     color:COLORS.fat,  val:gFat,  set:setGFat,  ph:{g:"62",  p:"33"} },
              { macro:"pro",  label:"PROTEIN", color:COLORS.pro,  val:gPro,  set:setGPro,  ph:{g:"149", p:"35"} },
            ].map(f => (
              <div key={f.macro}>
                <div style={s.macroGoalRow}>
                  <div style={{ ...s.macroGoalLabel, color: f.color }}>{f.label}</div>
                  <div style={s.toggleGroup}>
                    <button style={{ ...s.toggleBtn, ...(tempModes[f.macro]==="g" ? s.toggleActive : {}) }}
                      onClick={() => setTempModes(m => ({ ...m, [f.macro]:"g" }))}>g</button>
                    <button style={{ ...s.toggleBtn, ...(tempModes[f.macro]==="%" ? s.toggleActive : {}) }}
                      onClick={() => setTempModes(m => ({ ...m, [f.macro]:"%" }))}>%</button>
                  </div>
                  <input style={s.goalInputSmall} type="number" inputMode="decimal"
                    placeholder={tempModes[f.macro]==="%" ? f.ph.p : f.ph.g} value={f.val} onChange={e => f.set(e.target.value)} />
                </div>
                <div style={s.hintRow}>{hint(f.macro, f.val, gCal)}</div>
              </div>
            ))}
            <button style={s.saveBtn} onClick={saveGoals}>SAVE GOALS</button>
            <button style={s.resetBtn} onClick={resetAll}>CLEAR ALL DATA</button>
          </div>
        </div>
      )}
    </div>
  );
}

const s = {
  root: { background:"#0f0f0f", minHeight:"100vh", color:"#f0f0f0", paddingBottom:100 },
  header: { background:"#1a1a1a", borderBottom:"1px solid #2e2e2e", padding:"18px 20px 14px", position:"sticky", top:0, zIndex:10 },
  headerTitle: { fontSize:26, fontWeight:900, letterSpacing:3, color:"#f97316" },
  headerSub: { fontSize:12, color:"#666", marginTop:2 },
  dateBar: { display:"flex", alignItems:"center", justifyContent:"space-between", padding:"12px 20px", background:"#1a1a1a", borderBottom:"1px solid #2e2e2e" },
  dateBtn: { background:"none", border:"none", color:"#666", fontSize:22, cursor:"pointer", padding:"4px 10px" },
  dateLabel: { fontSize:14, fontWeight:500 },
  rings: { display:"grid", gridTemplateColumns:"repeat(4,1fr)", gap:10, padding:16 },
  ringCard: { background:"#1a1a1a", borderRadius:14, padding:"14px 10px", textAlign:"center", border:"1px solid #2e2e2e" },
  ringLabel: { fontSize:11, fontWeight:700, letterSpacing:1, marginTop:8, color:"#666" },
  ringRemain: { fontSize:13, fontWeight:700, marginTop:2 },
  pbSection: { padding:"0 16px 12px", display:"flex", flexDirection:"column", gap:8 },
  pbRow: { display:"grid", gridTemplateColumns:"32px 1fr 80px", alignItems:"center", gap:8 },
  pbLabel: { fontSize:11, fontWeight:700, color:"#666" },
  pbTrack: { height:6, background:"#2e2e2e", borderRadius:99, overflow:"hidden" },
  pbFill: { height:"100%", borderRadius:99 },
  pbValue: { fontSize:11, fontWeight:600, textAlign:"right" },
  section: { padding:"0 16px", marginTop:8 },
  sectionTitleRow: { display:"flex", alignItems:"center", justifyContent:"space-between", marginBottom:10 },
  sectionTitle: { fontSize:13, fontWeight:700, letterSpacing:2, color:"#666" },
  copyBtn: { background:"#242424", border:"1px solid #2e2e2e", borderRadius:7, color:"#f0f0f0", fontFamily:"inherit", fontSize:12, fontWeight:600, padding:"6px 12px", cursor:"pointer" },
  weeklyToggle: { width:"100%", background:"#1a1a1a", border:"1px solid #2e2e2e", borderRadius:10, color:"#666", fontFamily:"inherit", fontSize:13, fontWeight:600, padding:"10px", cursor:"pointer", marginBottom:8 },
  weeklyCard: { background:"#1a1a1a", borderRadius:12, border:"1px solid #2e2e2e", overflow:"hidden", marginBottom:12 },
